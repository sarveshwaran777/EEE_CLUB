[build]
  publish = "."

# Proxy all Netlify API requests directly to your live Render backend
[[redirects]]
  from = "/api/*"
  to = "https://eee-club.onrender.com/api/:splat"
  status = 200
  force = true

# Single Page App fallback routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
